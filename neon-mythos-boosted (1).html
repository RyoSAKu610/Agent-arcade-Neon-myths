<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08091a">
  <title>⚔ NEON MYTHOS</title>
  <style>
    /* Google Fonts with local fallback */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #08091a;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    #root { width: 100%; height: 100svh; overflow: hidden; }

    /* ── Loading Screen ──────────────────────────────── */
    #nm-loading {
      position: fixed; inset: 0; z-index: 9999;
      background: #08091a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    .nm-logo {
      font-size: clamp(22px, 6vw, 36px); font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(90deg, #FF69B4, #00E5FF, #FFD700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-family: monospace; animation: nmPulse 2s infinite;
    }
    .nm-bar-wrap { width: min(260px, 70vw); height: 4px; background: #1a1a3e; border-radius: 4px; overflow: hidden; }
    .nm-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00E5FF, #FFD700, #FF69B4);
      border-radius: 4px; animation: nmLoad 1.2s ease forwards;
    }
    .nm-sub { font-size: 11px; color: #445; font-family: monospace; letter-spacing: 2px; }
    .nm-dots { display: flex; gap: 6px; }
    .nm-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: nmDot 1.2s infinite;
    }
    @keyframes nmLoad { 0%{width:0%} 100%{width:100%} }
    @keyframes nmPulse { 0%,100%{opacity:1} 50%{opacity:.65} }
    @keyframes nmDot {
      0%,80%,100%{transform:scale(0);opacity:.3}
      40%{transform:scale(1);opacity:1}
    }

    /* ── Error Screen ────────────────────────────────── */
    #nm-error {
      display: none; position: fixed; inset: 0; z-index: 10000;
      background: #08091a; color: #FF4444;
      align-items: center; justify-content: center; flex-direction: column;
      gap: 12px; font-family: monospace; padding: 24px; text-align: center;
    }

    /* ── Global UX ───────────────────────────────────── */
    button {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    button:active { opacity: 0.75; transform: scale(0.96); }

    /* Safe area (iPhone notch/home bar) */
    @supports (padding: env(safe-area-inset-bottom)) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }
    .qte-tap-btn { min-height: 56px; font-size: 20px !important; letter-spacing: 2px; }
    @media (max-width: 640px) {
      .qte-tap-btn { min-height: 72px !important; font-size: 24px !important; }
    }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: #0a0a1a; }
    ::-webkit-scrollbar-thumb { background: #2a2a4e; border-radius: 2px; }
    @media (max-width: 640px) { ::-webkit-scrollbar { display: none; } }
  </style>

  <!-- ═══════════════════════════════════════════════
       VISUAL BOOST LAYER — NEON MYTHOS ENHANCED
  ═══════════════════════════════════════════════ -->
  <style>
    /* ── Enhanced Fonts ───────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Exo+2:ital,wght@0,300;0,600;0,900;1,300&display=swap');

    /* ── Global Glow Theme ───────────────────────── */
    :root {
      --neon-cyan:    #00E5FF;
      --neon-pink:    #FF69B4;
      --neon-gold:    #FFD700;
      --neon-green:   #00FF88;
      --neon-violet:  #BF5FFF;
      --neon-orange:  #FF6B35;
      --bg-deep:      #05060f;
    }

    html, body { background: var(--bg-deep) !important; }

    /* ── Particle canvas (behind everything) ───── */
    #nm-particle-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── CRT scanline overlay ───────────────────── */
    #nm-scanlines {
      position: fixed; inset: 0; z-index: 9998;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      animation: nm-scanroll 12s linear infinite;
    }
    @keyframes nm-scanroll {
      from { background-position: 0 0; }
      to   { background-position: 0 100vh; }
    }

    /* ── Chromatic aberration on body ──────────── */
    #root {
      position: relative; z-index: 1;
    }

    /* ── Corner ambient glow blobs ──────────────── */
    #nm-glow-tl, #nm-glow-br, #nm-glow-tr, #nm-glow-bl {
      position: fixed; pointer-events: none; z-index: 0; border-radius: 50%;
      filter: blur(80px); opacity: .18;
      animation: nm-breathe 6s ease-in-out infinite;
    }
    #nm-glow-tl {
      width: 320px; height: 320px; top: -80px; left: -80px;
      background: var(--neon-cyan);
      animation-delay: 0s;
    }
    #nm-glow-tr {
      width: 280px; height: 280px; top: -60px; right: -60px;
      background: var(--neon-violet);
      animation-delay: 1.5s;
    }
    #nm-glow-br {
      width: 360px; height: 360px; bottom: -100px; right: -100px;
      background: var(--neon-pink);
      animation-delay: 3s;
    }
    #nm-glow-bl {
      width: 250px; height: 250px; bottom: -60px; left: -60px;
      background: var(--neon-green);
      animation-delay: 4.5s;
    }
    @keyframes nm-breathe {
      0%, 100% { opacity: .14; transform: scale(1); }
      50%       { opacity: .26; transform: scale(1.12); }
    }

    /* ── Enhanced loading screen ─────────────────── */
    #nm-loading {
      background: radial-gradient(ellipse at 50% 40%, #0d1128 0%, #05060f 70%) !important;
    }
    .nm-logo {
      font-family: 'Orbitron', monospace !important;
      font-size: clamp(28px, 8vw, 52px) !important;
      font-weight: 900 !important;
      letter-spacing: 10px !important;
      background: linear-gradient(90deg, var(--neon-pink) 0%, var(--neon-cyan) 45%, var(--neon-gold) 100%) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      filter: drop-shadow(0 0 18px rgba(0,229,255,.6));
      animation: nmPulse 2s infinite, nm-logo-glow 3s ease-in-out infinite !important;
    }
    @keyframes nm-logo-glow {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(0,229,255,.5)); }
      50%       { filter: drop-shadow(0 0 28px rgba(255,105,180,.8)) drop-shadow(0 0 50px rgba(0,229,255,.4)); }
    }
    .nm-bar-wrap {
      width: min(340px, 80vw) !important;
      height: 6px !important;
      background: rgba(26,26,62,.8) !important;
      border: 1px solid #1a1a4e !important;
      border-radius: 6px !important;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,229,255,.2);
    }
    .nm-bar {
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-violet), var(--neon-pink)) !important;
      box-shadow: 0 0 10px rgba(0,229,255,.8), 0 0 20px rgba(191,95,255,.4) !important;
    }
    .nm-sub {
      color: #556699 !important; font-family: 'Share Tech Mono', monospace !important;
      letter-spacing: 4px !important; font-size: 12px !important;
    }
    .nm-dot {
      box-shadow: 0 0 6px currentColor;
    }

    /* ── Scrollbar glow ──────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #06060e; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--neon-cyan), var(--neon-violet));
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,229,255,.5);
    }

    /* ── Button micro-interactions ───────────────── */
    button {
      transition: box-shadow .15s ease, transform .1s ease, opacity .1s ease !important;
    }
    button:hover {
      box-shadow: 0 0 8px rgba(0,229,255,.35) !important;
    }
    button:active {
      transform: scale(0.94) !important;
      opacity: .75 !important;
    }

    /* ── Neon text shimmer on headings ───────────── */
    @keyframes nm-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    /* ── Floating data-mote particles ───────────── */
    @keyframes nm-mote-float {
      0%   { transform: translateY(0) scale(1);   opacity: .7; }
      50%  { transform: translateY(-18px) scale(1.3); opacity: 1; }
      100% { transform: translateY(-36px) scale(.7); opacity: 0; }
    }

    /* ── QTE panel enhanced flash ───────────────── */
    @keyframes nm-qte-flash {
      0%, 100% { box-shadow: 0 0 20px rgba(255,100,50,.4); }
      50%       { box-shadow: 0 0 60px rgba(255,100,50,.9), inset 0 0 30px rgba(255,100,50,.15); }
    }

    /* ── Pixel sprite extra glow ─────────────────── */
    canvas { image-rendering: pixelated; }

    /* ── Vignette frame ──────────────────────────── */
    #nm-vignette {
      position: fixed; inset: 0; z-index: 9997; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%,
        transparent 55%,
        rgba(0,0,0,.55) 100%
      );
    }

    /* ── Ticker strip enhanced ───────────────────── */
    @keyframes nm-ticker-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Holographic grid shimmer on hover ───────── */
    #nm-holograph {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: nm-grid-pulse 8s ease-in-out infinite;
    }
    @keyframes nm-grid-pulse {
      0%, 100% { opacity: .6; }
      50%       { opacity: 1; }
    }

    /* ── Data stream columns (Matrix rain) ──────── */
    #nm-datastream-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .04;
    }
  </style>

</head>
<body>

  <!-- Loading Screen -->
  <div id="nm-loading">
    <div class="nm-logo">⚔ NEON MYTHOS</div>
    <div class="nm-dots" id="nm-dots"></div>
    <div class="nm-bar-wrap"><div class="nm-bar"></div></div>
    <div class="nm-sub" id="nm-status">INITIALIZING...</div>
    <button id="nm-play-btn" style="display:none; margin-top:20px; padding:12px 28px; background:linear-gradient(90deg, #FF69B4, #00E5FF); border:none; color:#000; font-weight:bold; font-size:16px; font-family:monospace; border-radius:8px; cursor:pointer;">PLAY NOW</button>
  </div>

  <!-- Error Screen -->
  <div id="nm-error">
    <div style="font-size:36px">⚠</div>
    <div style="font-size:16px;font-weight:bold">SYSTEM ERROR</div>
    <div id="nm-err-msg" style="font-size:12px;color:#888;max-width:360px;margin-top:4px"></div>
    <button onclick="location.reload()" style="margin-top:16px;padding:12px 28px;background:#FF444422;border:2px solid #FF4444;color:#FF4444;border-radius:8px;font-family:monospace;font-size:14px">↺ RETRY</button>
  </div>

  <!-- App Root -->
  <div id="root"></div>

  <script>
  (function() {
    /* ── Ambient glow blobs ─────────────────────── */
    ['tl','tr','br','bl'].forEach(id => {
      const d = document.createElement('div');
      d.id = 'nm-glow-' + id;
      document.body.insertBefore(d, document.body.firstChild);
    });

    /* ── Holographic grid ───────────────────────── */
    const grid = document.createElement('div');
    grid.id = 'nm-holograph';
    document.body.insertBefore(grid, document.body.firstChild);

    /* ── Vignette ────────────────────────────────── */
    const vign = document.createElement('div');
    vign.id = 'nm-vignette';
    document.body.appendChild(vign);

    /* ── CRT scan lines ──────────────────────────── */
    const scan = document.createElement('div');
    scan.id = 'nm-scanlines';
    document.body.appendChild(scan);

    /* ── Data stream (Matrix rain) canvas ────────── */
    const dsCanvas = document.createElement('canvas');
    dsCanvas.id = 'nm-datastream-canvas';
    document.body.insertBefore(dsCanvas, document.body.firstChild);
    function resizeDS() {
      dsCanvas.width  = window.innerWidth;
      dsCanvas.height = window.innerHeight;
    }
    resizeDS();
    window.addEventListener('resize', resizeDS);

    const dsCtx = dsCanvas.getContext('2d');
    const CHARS = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ∑∆Ω∞';
    const COL_W = 14;
    let cols = [];
    function initCols() {
      cols = Array.from({ length: Math.ceil(window.innerWidth / COL_W) },
        () => ({ y: Math.random() * window.innerHeight / 14 - 40, speed: .4 + Math.random() * .6 }));
    }
    initCols();
    window.addEventListener('resize', initCols);

    function drawDS() {
      dsCtx.fillStyle = 'rgba(5,6,15,.18)';
      dsCtx.fillRect(0, 0, dsCanvas.width, dsCanvas.height);
      dsCtx.font = '12px "Share Tech Mono", monospace';
      cols.forEach((col, i) => {
        const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
        // Lead char: bright cyan
        dsCtx.fillStyle = 'rgba(0,229,255,1)';
        dsCtx.fillText(ch, i * COL_W, col.y * 14);
        // Trail: dimmer
        dsCtx.fillStyle = 'rgba(0,229,255,.45)';
        dsCtx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], i * COL_W, (col.y - 1) * 14);
        col.y += col.speed;
        if (col.y * 14 > dsCanvas.height + 40) {
          col.y = -5 - Math.random() * 20;
        }
      });
    }

    /* ── Particle system ─────────────────────────── */
    const pCanvas = document.createElement('canvas');
    pCanvas.id = 'nm-particle-canvas';
    document.body.insertBefore(pCanvas, document.body.firstChild);
    function resizeP() {
      pCanvas.width  = window.innerWidth;
      pCanvas.height = window.innerHeight;
    }
    resizeP();
    window.addEventListener('resize', resizeP);

    const pCtx = pCanvas.getContext('2d');
    const NEON_COLS = ['#00E5FF','#FF69B4','#FFD700','#00FF88','#BF5FFF','#FF6B35'];
    let particles = [];

    function spawnParticle() {
      return {
        x: Math.random() * window.innerWidth,
        y: window.innerHeight + 10,
        vx: (Math.random() - .5) * .6,
        vy: -(0.5 + Math.random() * 1.2),
        r:  .8 + Math.random() * 2.2,
        col: NEON_COLS[Math.floor(Math.random() * NEON_COLS.length)],
        life: 1,
        decay: .003 + Math.random() * .005
      };
    }
    // Fix the Math.5 typo
    function spawnParticleFixed() {
      return {
        x: Math.random() * window.innerWidth,
        y: window.innerHeight + 10,
        vx: (Math.random() - .5) * .6,
        vy: -(0.5 + Math.random() * 1.2),
        r:  .8 + Math.random() * 2.2,
        col: NEON_COLS[Math.floor(Math.random() * NEON_COLS.length)],
        life: 1,
        decay: .003 + Math.random() * .005
      };
    }

    // Stars (static twinkle layer)
    const stars = Array.from({ length: 120 }, () => ({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      r: .3 + Math.random() * 1.2,
      twinkle: Math.random() * Math.PI * 2,
      speed: .02 + Math.random() * .04
    }));

    function drawParticles() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

      // Stars
      pCtx.save();
      stars.forEach(s => {
        s.twinkle += s.speed;
        const alpha = .3 + .4 * Math.abs(Math.sin(s.twinkle));
        pCtx.beginPath();
        pCtx.arc(s.x % pCanvas.width, s.y % pCanvas.height, s.r, 0, Math.PI * 2);
        pCtx.fillStyle = `rgba(180,210,255,${alpha})`;
        pCtx.fill();
      });
      pCtx.restore();

      // Rising particles
      if (particles.length < 60 && Math.random() < .4) {
        particles.push(spawnParticleFixed());
      }
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.life -= p.decay;

        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pCtx.fillStyle = p.col;
        pCtx.globalAlpha = p.life * .7;
        pCtx.fill();

        // Glow halo
        const g = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
        g.addColorStop(0, p.col);
        g.addColorStop(1, 'transparent');
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
        pCtx.fillStyle = g;
        pCtx.globalAlpha = p.life * .15;
        pCtx.fill();
        pCtx.globalAlpha = 1;
      });
    }

    /* ── Bottom ticker strip ─────────────────────── */
    const TICKER_DATA = [
      { sym:'SOL',  val:'142.50', chg:'+2.3%', col:'#00E5FF' },
      { sym:'NEON', val:'0.851',  chg:'+11.2%',col:'#BF5FFF' },
      { sym:'DATA', val:'2.30',   chg:'-0.4%', col:'#00FF88' },
      { sym:'YEN',  val:'0.0067', chg:'+0.1%', col:'#FFD700' },
      { sym:'CON',  val:'45.0',   chg:'+3.7%', col:'#FF69B4' },
      { sym:'JUP',  val:'1.120',  chg:'+8.9%', col:'#FF6B35' },
      { sym:'BTC',  val:'84220',  chg:'+1.1%', col:'#FFD700' },
      { sym:'ETH',  val:'3100',   chg:'+0.7%', col:'#00E5FF' },
    ];

    function createTicker() {
      const strip = document.createElement('div');
      strip.id = 'nm-ticker';
      Object.assign(strip.style, {
        position: 'fixed', bottom: '0', left: '0', right: '0',
        height: '22px', zIndex: '9996',
        background: 'rgba(5,6,15,.85)',
        borderTop: '1px solid rgba(0,229,255,.18)',
        display: 'flex', alignItems: 'center', overflow: 'hidden',
        fontFamily: '"Share Tech Mono", monospace', fontSize: '10px',
        backdropFilter: 'blur(6px)',
        pointerEvents: 'none'
      });

      const inner = document.createElement('div');
      Object.assign(inner.style, {
        display: 'flex', gap: '0', whiteSpace: 'nowrap',
        animation: 'nm-ticker-scroll 28s linear infinite'
      });

      const makeItems = () => TICKER_DATA.map(t => {
        const isUp = t.chg.startsWith('+');
        const span = document.createElement('span');
        Object.assign(span.style, {
          padding: '0 18px', borderRight: '1px solid rgba(255,255,255,.05)',
          display: 'flex', gap: '5px', alignItems: 'center'
        });
        span.innerHTML = `<span style="color:${t.col};font-weight:bold;letter-spacing:1px">${t.sym}</span>`
          + `<span style="color:#ccc">${t.val}</span>`
          + `<span style="color:${isUp ? '#00FF88' : '#FF4444'}">${t.chg}</span>`;
        return span;
      });

      // Duplicate for seamless loop
      [...makeItems(), ...makeItems()].forEach(el => inner.appendChild(el));
      strip.appendChild(inner);
      document.body.appendChild(strip);

      // Update prices periodically
      setInterval(() => {
        TICKER_DATA.forEach(t => {
          const drift = (Math.random() - .48) * .8;
          const num = parseFloat(t.val) * (1 + drift / 100);
          t.val = num < 1 ? num.toFixed(4) : num < 100 ? num.toFixed(2) : Math.round(num).toString();
          t.chg = (drift > 0 ? '+' : '') + (drift).toFixed(1) + '%';
          t.col = drift > 0 ? t.col : t.col; // keep color
        });
        inner.innerHTML = '';
        [...makeItems(), ...makeItems()].forEach(el => inner.appendChild(el));
      }, 5000);
    }

    /* ── Boot sequence enhanced loader ──────────── */
    function enhanceLoader() {
      const loading = document.getElementById('nm-loading');
      if (!loading) return;

      // Add extra sub-text lines
      const statusEl = document.getElementById('nm-status');
      const msgs = [
        'INITIALIZING AGENT NEURAL NETS...',
        'CALIBRATING MARKET FEEDS...',
        'LOADING CITY GRID 32x18...',
        'SPAWNING AI AGENTS...',
        'CONNECTING TO NEON NETWORK...',
        'COMPILING SPECIALTY MODULES...',
        'READY'
      ];
      let mi = 0;
      const msgIv = setInterval(() => {
        if (!statusEl) { clearInterval(msgIv); return; }
        if (mi < msgs.length) statusEl.textContent = msgs[mi++];
        else {
          clearInterval(msgIv);
          const playBtn = document.getElementById('nm-play-btn');
          if (playBtn) {
            playBtn.style.display = 'block';
            playBtn.addEventListener('click', () => {
              if (!loading) return;
              loading.style.transition = "opacity 0.4s ease";
              loading.style.opacity = "0";
              setTimeout(function() { if (loading.parentNode) loading.parentNode.removeChild(loading); }, 420);
            });
          }
        }
      }, 200);

      // Add scanning line inside loader
      const scanLine = document.createElement('div');
      Object.assign(scanLine.style, {
        position: 'absolute', left: '0', right: '0', height: '2px',
        background: 'linear-gradient(90deg, transparent, #00E5FF, transparent)',
        boxShadow: '0 0 10px #00E5FF',
        animation: 'nm-boot-scan 1.6s ease-in-out infinite',
        top: '0'
      });
      const scanStyle = document.createElement('style');
      scanStyle.textContent = `@keyframes nm-boot-scan {
        0%   { top:0%; opacity:0 }
        10%  { opacity:1 }
        90%  { opacity:1 }
        100% { top:100%; opacity:0 }
      }`;
      document.head.appendChild(scanStyle);
      loading.style.position = 'relative';
      loading.style.overflow = 'hidden';
      loading.appendChild(scanLine);
    }

    /* ── Mouse parallax on glow blobs ───────────── */
    function initParallax() {
      document.addEventListener('mousemove', e => {
        const mx = e.clientX / window.innerWidth - .5;
        const my = e.clientY / window.innerHeight - .5;
        const tl = document.getElementById('nm-glow-tl');
        const br = document.getElementById('nm-glow-br');
        if (tl) tl.style.transform = `translate(${mx*20}px,${my*20}px)`;
        if (br) br.style.transform = `translate(${-mx*20}px,${-my*20}px)`;
      });
    }

    /* ── Main render loop ────────────────────────── */
    let rafId;
    function render() {
      drawDS();
      drawParticles();
      rafId = requestAnimationFrame(render);
    }

    /* ── Init on DOM ready ───────────────────────── */
    function boot() {
      enhanceLoader();
      createTicker();
      initParallax();
      render();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  })();
  </script>

        specialty: def.label,
        color: def.color,
        title: `${specialty ? specialty.charAt(0).toUpperCase() + specialty.slice(1) : 'Autonomous'} AI Agent`,
        company: "Neon City Agentic OS™",
        tagline: "自律的に思考・行動し、都市のオペレーションを最適化するAIエージェント。複数タスクを並列処理し、人間の10倍の速度で業務を遂行。",
        roi: [
          { label: "処理速度",    value: "×10倍",  color: def.color },
          { label: "稼働率",      value: "99.8%",  color: "#00FF88" },
          { label: "コスト効率",  value: "+180%",  color: "#FFD700" },
        ],
        skills: [
          { name: "自律タスク実行",   pct: 85 + Math.random() * 12 | 0 },
          { name: "マルチエージェント連携", pct: 75 + Math.random() * 15 | 0 },
          { name: "自然言語処理",    pct: 80 + Math.random() * 15 | 0 },
          { name: "リアルタイム適応",  pct: 78 + Math.random() * 14 | 0 },
        ],
        status: ["🟢 ONLINE", `SPEC:${(specialty || 'AGENT').toUpperCase()}`, "AUTO:ON"],
        history: [
          { period: "2025.Q1–", role: "Autonomous City Agent",  company: "Neon City Gov" },
          { period: "2024.Q3",  role: "Beta Deployment",         company: "Agentic Labs" },
          { period: "2024.Q1",  role: "Training & Fine-tuning",  company: "NeonMythos AI" },
        ],
        cta: { label: "詳細・デモを見る →", url: "#" },
      };
    }

    /* ── DOM refs ────────────────────────────── */
    const overlay   = document.getElementById('nm-resume-overlay');
    const card      = document.getElementById('nm-resume-card');
    const closeBtn  = document.getElementById('nmr-close-btn');
    const badgeEl   = document.getElementById('nmr-badge');
    const nameEl    = document.getElementById('nmr-name');
    const portraitEl = document.getElementById('nmr-portrait');
    const titleEl   = document.getElementById('nmr-title');
    const companyEl = document.getElementById('nmr-company');
    const tagEl     = document.getElementById('nmr-tagline');
    const roiGrid   = document.getElementById('nmr-roi-grid');
    const skillRow  = document.getElementById('nmr-skill-row');
    const statusRow = document.getElementById('nmr-status-row');
    const histEl    = document.getElementById('nmr-history');
    const ctaEl     = document.getElementById('nmr-cta');
    const ctaLabel  = document.getElementById('nmr-cta-label');

    let currentAgent = null;
    const RESUME_PORTRAITS = {
      "KANE-KAMI": { image: "ChatGPT Image 2026年4月28日 14_03_52.png", zoom: "294%", x: "18%", y: "16%" },
      "ORACLE-01": { image: "ChatGPT Image 2026年4月28日 14_03_49.png", zoom: "292%", x: "19%", y: "19%" },
      "NEGO-CHAN": { image: "ChatGPT Image 2026年4月28日 14_03_54.png", zoom: "270%", x: "20%", y: "22%" },

      "DRONE-TAN": { image: "ChatGPT Image 2026年4月28日 14_03_49.png", zoom: "292%", x: "18%", y: "74%" },
      "SAGE-BOY": { image: "ChatGPT Image 2026年4月28日 14_03_49.png", zoom: "286%", x: "68%", y: "18%" },
      "ZERO": { image: "ChatGPT Image 2026年4月28日 14_03_46.png", zoom: "300%", x: "18%", y: "22%" },
      "GHOST": { image: "ChatGPT Image 2026年4月28日 14_03_46.png", zoom: "330%", x: "88%", y: "22%" }
    };

    function openResume(agentName, specialty) {
      const data = RESUME[agentName] || makeGenericResume(agentName, specialty);
      currentAgent = agentName;

      /* CSS custom properties for theming */
      card.style.setProperty('--agent-color', data.color);
      card.style.setProperty('--agent-color-dim', data.color + '18');
      const portrait = RESUME_PORTRAITS[agentName] || RESUME_PORTRAITS["NEGO-CHAN"];
      portraitEl.style.setProperty('--nmr-image', `url('${portrait.image}')`);
      portraitEl.style.setProperty('--nmr-zoom', portrait.zoom);
      portraitEl.style.setProperty('--nmr-x', portrait.x);
      portraitEl.style.setProperty('--nmr-y', portrait.y);

      /* Header */
      badgeEl.textContent  = data.specialty;
      nameEl.textContent   = agentName;
      titleEl.textContent  = data.title;
      companyEl.textContent = data.company;
      tagEl.textContent    = data.tagline;

      /* ROI */
      roiGrid.innerHTML = data.roi.map(r => `
        <div class="nmr-roi-item">
          <div class="nmr-roi-value" style="color:${r.color}">${r.value}</div>
          <div class="nmr-roi-label">${r.label}</div>
        </div>`).join('');

      /* Skills */
      skillRow.innerHTML = data.skills.map(s => `
        <div class="nmr-skill-item">
          <div class="nmr-skill-head">
            <span class="nmr-skill-name">${s.name}</span>
            <span class="nmr-skill-pct">${s.pct}%</span>
          </div>
          <div class="nmr-skill-bar-bg">
            <div class="nmr-skill-bar-fill" style="transform:scaleX(${s.pct/100})"></div>
          </div>
        </div>`).join('');

      /* Status chips */
      statusRow.innerHTML = data.status.map((s, i) =>
        `<span class="nmr-chip${i===0?' online':''}">${s}</span>`
      ).join('');

      /* History */
      histEl.innerHTML = data.history.map(h => `
        <div class="nmr-history-item" style="position:relative">
          <div class="nmr-history-period">${h.period}</div>
          <div>
            <div style="position:absolute;left:50px;top:5px;width:8px;height:8px;border-radius:50%;
                        background:${data.color};box-shadow:0 0 5px ${data.color}"></div>
            <div class="nmr-history-role">${h.role}</div>
            <div class="nmr-history-company">${h.company}</div>
          </div>
        </div>`).join('');

      /* CTA */
      ctaLabel.textContent = data.cta.label;
      ctaEl.href = data.cta.url || '#';

      /* Animate open */
      card.classList.add('open');

      /* Animate skill bars after paint */
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.querySelectorAll('.nmr-skill-bar-fill').forEach(el => {
            el.style.transform = 'scaleX(0)';
            requestAnimationFrame(() => {
              el.style.transform = '';
              el.classList.add('animate');
            });
          });
        });
      });
    }

    function closeResume() {
      card.classList.remove('open');
      currentAgent = null;
    }

    closeBtn.addEventListener('click', closeResume);
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeResume();
    });
    window.addEventListener('nm:agent-detail', e => {
      const name = e.detail && e.detail.name;
      if (name) openResume(name, null);
    });
    window.addEventListener('nm:agent-detail-close', closeResume);
    document.addEventListener('click', e => {
      const root = document.getElementById('root');
      if (!root || !root.contains(e.target)) return;
      const found = detectClickedAgent(e.target);
      if (found) openResume(found, findSpecialtyNear(e.target));
    }, true);

    /* ── Open details only from an intentional character click ─ */
    function detectClickedAgent(target) {
      const allNames = Object.keys(RESUME);
      let el = target;
      for (let depth = 0; el && depth < 8; depth += 1, el = el.parentElement) {
        const text = (el.textContent || '').replace(/\s+/g, ' ').trim();
        if (text.length > 80) continue;
        const found = allNames.find(name => text === name || text.includes(name));
        if (found) return found;
      }
      return null;
    }

    function findSpecialtyNear(target) {
      const text = (target && target.closest && target.closest('div')?.textContent || '').toLowerCase();
      return Object.keys(SPECIALTY_DEFAULTS).find(k => text.includes(k)) || null;
    }

    function startObserving() {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        /* Details are opened by PixelChar's nm:agent-detail event. */
      } else {
        setTimeout(startObserving, 500);
      }
    }
    startObserving();

    /* ── Keyboard close ──────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && card.classList.contains('open')) {
        closeResume();
        e.stopPropagation();
      }
    });

  })();
  </script>

  <script>
  (() => {
    const agentAssets = {
      idle: "ChatGPT Image 2026年4月28日 14_03_54.png",
      listening: "ChatGPT Image 2026年4月28日 14_03_52.png",
      thinking: "ChatGPT Image 2026年4月28日 14_03_46.png",
      speaking: "ChatGPT Image 2026年4月28日 14_03_49.png",
      joy: "ChatGPT Image 2026年4月28日 14_03_31.png",
      success: "ChatGPT Image 2026年4月28日 14_03_31.png"
    };

    const stateLabels = {
      idle: "IDLE",
      listening: "LISTENING",
      thinking: "THINKING",
      speaking: "SPEAKING",
      joy: "SUCCESS",
      success: "SUCCESS"
    };

    const shell = document.getElementById("nm-agent-shell");
    const log = document.getElementById("nm-agent-log");
    const form = document.getElementById("nm-agent-form");
    const input = document.getElementById("nm-agent-input");
    const label = document.getElementById("nm-agent-state-label");
    const toggle = shell.querySelector(".nm-agent-toggle");
    const avatarButton = shell.querySelector(".nm-agent-avatar-stage");
    const portraits = Array.from(shell.querySelectorAll(".nm-agent-portrait"));

    const agentStore = {
      state: "idle",
      busy: false,
      idleTimer: null,
      messages: []
    };

    const setAgentState = (nextState) => {
      const normalized = agentAssets[nextState] ? nextState : "idle";
      agentStore.state = normalized;
      shell.dataset.state = normalized;
      label.textContent = stateLabels[normalized] || normalized.toUpperCase();
      portraits.forEach((img) => {
        img.classList.toggle("is-active", img.dataset.agentState === normalized || (normalized === "success" && img.dataset.agentState === "joy"));
      });
    };

    const scheduleIdle = (delay = 1800) => {
      window.clearTimeout(agentStore.idleTimer);
      agentStore.idleTimer = window.setTimeout(() => {
        if (!agentStore.busy && !input.value.trim()) setAgentState("idle");
      }, delay);
    };

    const appendMessage = (role, text) => {
      const item = document.createElement("div");
      item.className = `nm-agent-msg ${role}`;
      item.textContent = text;
      log.appendChild(item);
      log.scrollTop = log.scrollHeight;
      agentStore.messages.push({ role, text, at: new Date().toISOString() });
      return item;
    };

    const appendThinking = () => {
      const item = document.createElement("div");
      item.className = "nm-agent-msg agent";
      item.innerHTML = '<span class="nm-agent-typing" aria-label="Thinking"><i></i><i></i><i></i></span>';
      log.appendChild(item);
      log.scrollTop = log.scrollHeight;
      return item;
    };

    const typeAgentMessage = (target, text) => new Promise((resolve) => {
      let index = 0;
      target.textContent = "";
      setAgentState("speaking");
      const tick = () => {
        target.textContent = text.slice(0, index);
        log.scrollTop = log.scrollHeight;
        index += 1;
        if (index <= text.length) {
          window.setTimeout(tick, 18);
          return;
        }
        agentStore.messages.push({ role: "agent", text, at: new Date().toISOString() });
        resolve();
      };
      tick();
    });

    const mockAgentApi = async (message, history) => {
      await new Promise((resolve) => window.setTimeout(resolve, 1200 + Math.random() * 900));
      const lower = message.toLowerCase();
      if (/clear|解決|done|success|勝|ありがとう|thanks|最高/.test(lower)) {
        return "ミッションログを確認。いい流れです。次の一手まで、こちらで状況を整理しておきます。";
      }
      if (/help|使い方|何|どう|how/.test(lower)) {
        return "もちろん。いまはデモ接続なので、あとでOpenAI APIに差し替えられるよう送受信部分を分離しています。入力すると状態が listening → thinking → speaking に遷移します。";
      }
      if (history.length > 4) {
        return "会話コンテキストも保持中です。API接続時はこの履歴をそのままメッセージ配列として渡せます。";
      }
      return "受信しました。ネオン街のノイズを切り分けながら、あなたの意図に合わせて次の応答を組み立てます。";
    };

    const handleSubmit = async (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text || agentStore.busy) return;

      agentStore.busy = true;
      window.clearTimeout(agentStore.idleTimer);
      appendMessage("user", text);
      input.value = "";
      setAgentState("thinking");
      const thinkingNode = appendThinking();

      try {
        const reply = await mockAgentApi(text, agentStore.messages);
        await typeAgentMessage(thinkingNode, reply);
        const positive = /ありがとう|thanks|最高|done|clear|解決|success|勝/i.test(text + reply);
        setAgentState(positive ? "joy" : "speaking");
      } catch (error) {
        thinkingNode.textContent = "通信レイヤーでエラーを検知。API接続設定を確認してください。";
        setAgentState("idle");
      } finally {
        agentStore.busy = false;
        scheduleIdle(positiveDelay(text));
      }
    };

    const positiveDelay = (text) => (/ありがとう|thanks|最高|done|clear|解決|success|勝/i.test(text) ? 3200 : 2100);

    input.addEventListener("input", () => {
      if (agentStore.busy) return;
      setAgentState(input.value.trim() ? "listening" : "idle");
    });

    input.addEventListener("focus", () => {
      if (!agentStore.busy) setAgentState(input.value.trim() ? "listening" : "idle");
    });

    input.addEventListener("blur", () => scheduleIdle(650));
    form.addEventListener("submit", handleSubmit);

    toggle.addEventListener("click", () => {
      shell.classList.add("is-collapsed");
      setAgentState("idle");
    });

    avatarButton.addEventListener("click", () => {
      shell.classList.remove("is-collapsed");
      input.focus();
    });

    appendMessage("agent", "NEGO-CHAN online. 用件を送ってください。こちらで会話状態とレスポンス表示を制御します。");
    setAgentState("idle");
  })();
  </script>
